<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🪓 Video Silence Cutter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>🪓 Video Silence Cutter</h1>
  <p class="subtitle">Supprime automatiquement les silences d'une vidéo — 100&nbsp;% dans le navigateur</p>

  <div class="drop-zone" id="dropZone">
    📂 Glissez-déposez une vidéo ici<br>ou cliquez pour sélectionner
    <input type="file" id="fileInput" accept="video/*">
  </div>

  <div class="controls">
    <div class="control">
      <label>Sensibilité (garde les passages plus doux) <b id="sensVal">1.0×</b></label>
      <input type="range" id="sens" min="0.5" max="2.5" step="0.1" value="1.0">
    </div>
    <div class="control">
      <label>Silence minimum à couper <b id="silVal">0.40 s</b></label>
      <input type="range" id="sil" min="0.15" max="2" step="0.05" value="0.4">
    </div>
    <div class="control">
      <label>Marge conservée autour de la voix <b id="padVal">0.08 s</b></label>
      <input type="range" id="pad" min="0" max="0.3" step="0.01" value="0.08">
    </div>
  </div>

  <div id="status"></div>
  <div class="progress hidden" id="progressContainer">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div class="log hidden" id="logOutput"></div>

  <button class="btn" id="processBtn" disabled>🔪 Détecter et couper les silences</button>
  <a class="btn hidden" id="downloadLink" download="video_sans_silence.mp4">⬇️ Télécharger le résultat</a>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
